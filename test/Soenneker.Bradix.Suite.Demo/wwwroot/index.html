<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>Bradix Component Library Demo</title>
    <base href="%BASE_URL%" />
    <link href="https://cdn.jsdelivr.net/npm/@radix-ui/themes@3.2.1/styles.css" rel="stylesheet" />
    <link href="css/radix-website.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body class="radix-themes light"
      data-accent-color="blue"
      data-gray-color="slate"
      data-radius="medium"
      data-scaling="100%"
      data-panel-background="translucent">
    <div id="app">
        <div class="loading-screen">
            <div class="loading-screen__card">
                <p class="eyebrow">Bradix Suite</p>
                <h1>Loading component demos</h1>
                <p class="lede">Preparing the Blazor component library showcase and validation surface.</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
